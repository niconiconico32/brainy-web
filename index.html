<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Brainy Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #fff;
        }

        header {
            border-bottom: 1px solid #e0e0e0;
            padding: 2rem 0;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
            color: #000;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            text-decoration: none;
            color: #666;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #000;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 1rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            max-width: 600px;
            margin-bottom: 2rem;
        }

        footer {
            border-top: 1px solid #e0e0e0;
            padding: 2rem;
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">Brainy Web</a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/privacy.html">Privacy</a></li>
                <li><a href="/contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Welcome to Brainy Web</h1>
        <p>A minimalist web presence. Clean design, simple purpose. Get in touch with us or learn more about our privacy practices.</p>
    </main>

    <footer>
        <p>&copy; 2026 Brainy Web. All rights reserved.</p>
    </footer>
</body>
</html>
