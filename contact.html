<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Brainy ADHD</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-bg: rgb(236, 240, 237);
            --color-text: rgb(40, 13, 140);
            --color-accent: rgb(118, 99, 242);
            --color-dopamine: rgb(201, 253, 90);
            --color-card: rgba(255, 255, 255, 0.68);
            --color-border: rgba(40, 13, 140, 0.14);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--color-text);
            background-color: var(--color-bg);
            overflow-x: hidden;
        }

        header {
            padding: 20px 0;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 20;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            color: var(--color-text);
        }

        .logo span {
            color: var(--color-accent);
        }

        .top-nav {
            list-style: none;
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .top-nav a {
            text-decoration: none;
            color: var(--color-text);
            font-size: 0.95rem;
            font-weight: 700;
            opacity: 0.85;
            transition: all 0.2s ease;
        }

        .top-nav a:hover,
        .top-nav a[aria-current="page"] {
            color: var(--color-accent);
            opacity: 1;
        }

        .hero-contact {
            padding: 140px 0 44px 0;
        }

        .hero-contact h1 {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .hero-contact p {
            font-size: 1.16rem;
            max-width: 740px;
            opacity: 0.9;
        }

        .contact-hero {
            padding: 140px 0 120px 0;
            min-height: 70vh;
            display: flex;
            align-items: center;
        }

        .contact-container {
            text-align: center;
        }

        .contact-container h1 {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .contact-container p {
            font-size: 1.2rem;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        .email-link {
            color: var(--color-accent);
            font-weight: 800;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .email-link:hover {
            color: var(--color-text);
            text-decoration: underline;
        }

        .response-time {
            font-size: 1.1rem !important;
            color: rgba(40, 13, 140, 0.75);
            margin-top: 18px !important;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 24px;
            padding-bottom: 90px;
        }

        .contact-card,
        .form-card {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 24px;
            padding: 28px;
            backdrop-filter: blur(6px);
        }

        .contact-card h2,
        .form-card h2 {
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .contact-card p,
        .form-card p {
            color: rgba(40, 13, 140, 0.85);
            margin-bottom: 18px;
        }

        .contact-list {
            list-style: none;
            display: grid;
            gap: 12px;
            margin-top: 10px;
        }

        .contact-list li {
            padding: 12px 14px;
            border-radius: 14px;
            background-color: rgba(118, 99, 242, 0.08);
            border: 1px solid rgba(118, 99, 242, 0.2);
        }

        .contact-list a {
            color: var(--color-text);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-list a:hover {
            color: var(--color-accent);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-field {
            margin-bottom: 14px;
        }

        .form-field.full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 0.92rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            border: 1px solid rgba(118, 99, 242, 0.35);
            background-color: rgba(255, 255, 255, 0.88);
            color: var(--color-text);
            border-radius: 12px;
            padding: 12px 14px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(118, 99, 242, 0.2);
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        button {
            background-color: var(--color-dopamine);
            color: var(--color-text);
            border: none;
            border-radius: 999px;
            padding: 13px 22px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(201, 253, 90, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 253, 90, 0.6);
        }

        footer {
            background-color: var(--color-text);
            color: rgba(255, 255, 255, 0.8);
            padding: 50px 0;
            font-size: 0.9rem;
        }

        .footer-content {
            text-align: center;
        }

        .footer-links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: white;
            opacity: 0.7;
            text-decoration: none;
        }

        .footer-links a:hover,
        .footer-links a[aria-current="page"] {
            opacity: 1;
            color: var(--color-dopamine);
        }

        @media (max-width: 900px) {
            .nav-content {
                flex-direction: column;
                gap: 12px;
            }

            .top-nav {
                justify-content: center;
                flex-wrap: wrap;
            }

            .hero-contact {
                padding-top: 130px;
            }

            .hero-contact h1 {
                font-size: 2.4rem;
            }

            .contact-hero {
                padding: 130px 0 100px 0;
                min-height: auto;
            }

            .contact-container h1 {
                font-size: 2.4rem;
            }

            .contact-container p {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 600px) {
            .hero-contact {
                padding-top: 122px;
            }

            .hero-contact h1 {
                font-size: 2rem;
            }

            .hero-contact p {
                font-size: 1.03rem;
            }

            .contact-hero {
                padding: 120px 0 80px 0;
                min-height: auto;
            }

            .contact-container h1 {
                font-size: 1.88rem;
            }

            .contact-container p {
                font-size: 1.04rem;
            }

            .response-time {
                font-size: 0.98rem !important;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-content">
            <a href="index.html" class="logo">Brainy<span>ADHD</span></a>
            <ul class="top-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="privacy.html">Privacy</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section class="contact-hero">
            <div class="container contact-container">
                <h1>Need help with Brainy?</h1>
                <p>Contact us at <a href="mailto:support@brainyadhd.com" class="email-link">support@brainyadhd.com</a></p>
                <p class="response-time">We respond to all ADHD-related inquiries within 24 hours.</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 brainyadhd.com. All rights reserved.</p>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="privacy.html">Privacy</a>
                <a href="contact.html" aria-current="page">Contact</a>
            </div>
        </div>
    </footer>
</body>
</html>
